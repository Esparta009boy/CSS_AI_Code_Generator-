<!DOCTYPE html> <!-- A VERSÃO DO HTML QUE ESTAMOS USANDO -->
<!-- VERSÃO 5 DO HTML (MAIS MODERNA) -->

<html lang="pt-br">

<head>
    <meta charset="UTF-8"> <!-- PADRÃO DE CARACTERES -->
    <!-- Configuração da viewport para garantir responsividade em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Link para a folha de estilos externa -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Pré-conexão e importação das fontes do Google Fonts (Família Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Cyber Program - Gerador de IA</title>
</head>

<body>
    <!-- Cabeçalho principal da página -->
    <h1>CSS Gerador <span>com IA ⚡️</span></h1>

    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <!-- Área de texto -->
    <!-- Campo de entrada onde o usuário digita o prompt para a IA -->
    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>

    <!-- Campo seguro para a API Key -->
    <input type="password" class="input-chave" placeholder="Cole sua API Key da Groq aqui (gsk_...)" />

    <!-- Botão de ação que dispara o script -->
    <button class="botao-gerar">Gerar Código ⚡️</button>

    <!-- div = caixa invisível -->
    <!-- Container que agrupa os resultados: o código gerado e o preview visual -->
    <div class="resultado">

        <!-- Coluna da esquerda: Exibição do código fonte -->
        <div>
            <h2>Código</h2>
            <p class="bloco-codigo"></p>
        </div>

        <!-- Coluna da direita: Preview renderizado (Iframe) -->
        <div>
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>
    </div>

    

</body>

<!-- Importação do arquivo de lógica JavaScript -->
<script src="scripts.js"> 

</script>

</html>
